name: Browser Operator E2E

on:
  workflow_dispatch:

jobs:
  browser-operator-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install application dependencies
        run: python -m pip install -r requirements.txt
      - name: Install browser E2E dependencies
        run: python -m pip install -r requirements-browser-e2e.txt
      - name: Install Chromium and OS browser dependencies
        run: python -m playwright install --with-deps chromium
      - name: Run BROWSER_E2E profile
        run: python scripts/run_test_profile.py browser-e2e --json
