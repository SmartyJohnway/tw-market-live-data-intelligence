name: Default CI

on:
  workflow_dispatch:

jobs:
  default-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Compile Python files
        run: python -m compileall scripts server tests
      - name: Run DEFAULT_CI profile
        run: python scripts/run_test_profile.py default-ci --json
