name: Full Non-Network Regression

on:
  workflow_dispatch:

jobs:
  full-non-network:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile Python files
        run: python -m compileall scripts server tests
      - name: Run FULL_NON_NETWORK profile
        run: python scripts/run_test_profile.py full-non-network --json
