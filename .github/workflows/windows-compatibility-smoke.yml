name: Windows Compatibility Smoke

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    paths:
      - "scripts/m8r_filesystem_safety.py"
      - "scripts/m8r_03d_watchlist_controlled_executor.py"
      - "scripts/run_m8r_03e_watchlist_ai_context_handoff.py"
      - "tests/unit/test_m8r_filesystem_containment.py"
      - "tests/unit/test_m8r_03e_r2_filesystem_containment.py"
      - "config/test_execution_profiles.json"
      - ".github/workflows/windows-compatibility-smoke.yml"

jobs:
  windows-compatibility-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile filesystem containment surfaces
        run: python -m compileall scripts/m8r_filesystem_safety.py tests/unit/test_m8r_filesystem_containment.py tests/unit/test_m8r_03e_r2_filesystem_containment.py
      - name: Run Windows filesystem containment smoke
        run: python scripts/run_test_profile.py component-security --json
