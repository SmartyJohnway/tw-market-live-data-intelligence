<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>M5K Local AI Watchlist Workbench</title><style>body{font-family:system-ui;margin:2rem;max-width:1200px}textarea,pre{width:100%;min-height:12rem;background:#f7f7f7;border:1px solid #ccc;padding:1rem;white-space:pre-wrap}button{margin:.25rem}.badge{background:#eef;border:1px solid #99c;padding:.5rem;margin:.5rem 0}</style></head>
<body>
<h1>M5K Local AI Watchlist Workbench</h1>
<p class="badge">Level 1 M5F remains canonical and offline by default. Level 2 M5K is explicit, bounded, temporary, observational, and never promoted automatically.</p>
<section><h2>Watchlist</h2><p id="watchlistSummary"></p><button id="loadDefault">Load default</button><button id="validate">Validate</button><button id="export">Export</button><input id="import" type="file" accept="application/json"><textarea id="watchlistJson" aria-label="Editable M5K watchlist JSON"></textarea><pre id="validation"></pre></section>
<section><h2>AI Conversation Handoff</h2><button id="handoff">Create handoff artifact</button><pre id="handoffJson"></pre></section>
<section><h2>Bounded Live Observation</h2><button id="observe">Execute one observation</button><button id="readLatest">Read latest local observation</button><h3>Freshness / source display</h3><pre id="freshness"></pre><pre id="observationJson"></pre></section>
<script src="m5k-workbench.js"></script>
</body></html>
