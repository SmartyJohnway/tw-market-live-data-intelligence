[pytest]
markers =
    slow: slow/manual checks
    performance: performance and scalability checks
    historical: archived historical acceptance checks
    milestone: active milestone acceptance checks
    component_governance: governance/registry component checks
    component_agent_skill: Agent Skill component checks
    component_watchlist: watchlist/evidence component checks
    component_market_source: market-source component checks
    component_security: filesystem/security component checks
    contract: active authoritative contract tests
    core: permanent product regression tests
    fast: explicit FAST profile candidates for inner-loop deterministic validation
    default_ci: explicit DEFAULT_CI profile candidates for normal PR merge protection
    full_regression: broad FULL_NON_NETWORK regression candidates
    operator: operator/preflight validation contracts routed through authoritative runners
    offline: marks tests that should be run without network access
    network: marks tests that require network access; exclude with pytest -m "not network"
    not_network: marks tests that should be run without network access (legacy alias)
    unit: pure local logic, always safe, default CI
    mock: simulated source/failure envelopes, default CI where non-network
    integration: real bounded network checks, manual only and excluded from default CI with the network marker
    release_preflight: optional operator-run release preflight checks
    browser: optional browser automation tests; skipped unless Playwright/browser is installed and explicitly selected
    e2e: optional end-to-end operator workflow tests
    live: explicit bounded live checks; excluded from default CI with network marker

norecursedirs = tests/acceptance_archive
