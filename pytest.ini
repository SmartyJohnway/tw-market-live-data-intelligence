[pytest]
markers =
    offline: marks tests that should be run without network access
    network: marks tests that require network access; exclude with pytest -m "not network"
    not_network: marks tests that should be run without network access (legacy alias)
    unit: pure local logic, always safe, default CI
    mock: simulated source/failure envelopes, default CI where non-network
    integration: real bounded network checks, manual only and excluded from default CI with the network marker
    release_preflight: optional operator-run release preflight checks
